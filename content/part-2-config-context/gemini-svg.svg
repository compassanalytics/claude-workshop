<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" style="background-color: #f8fafc; font-family: system-ui, -apple-system, sans-serif;">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#f1f5f9" stroke-width="1"/>
    </pattern>
    <marker id="arrowdown" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrowleft" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto-start-reverse">
      <path d="M 10 0 L 0 5 L 10 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Level 1: Global -->
  <rect x="50" y="30" width="450" height="100" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="275" y="65" font-size="18" font-weight="bold" fill="#0369a1" text-anchor="middle">1. Global</text>
  <text x="275" y="90" font-size="14" font-family="monospace" fill="#0c4a6e" text-anchor="middle">~/.claude/CLAUDE.md</text>
  <text x="275" y="110" font-size="14" fill="#0c4a6e" text-anchor="middle">Personal defaults. Applies to every project.</text>

  <path d="M 275 130 L 275 160" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrowdown)"/>

  <!-- Level 2: Project -->
  <rect x="50" y="170" width="450" height="100" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="275" y="205" font-size="18" font-weight="bold" fill="#15803d" text-anchor="middle">2. Project Root</text>
  <text x="275" y="230" font-size="14" font-family="monospace" fill="#14532d" text-anchor="middle">./CLAUDE.md or ./.claude/CLAUDE.md</text>
  <text x="275" y="250" font-size="14" fill="#14532d" text-anchor="middle">Committed to git. Shared with your team.</text>

  <path d="M 275 270 L 275 300" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrowdown)"/>

  <!-- Level 3: Subdirectory -->
  <rect x="50" y="310" width="450" height="100" rx="8" fill="#fef08a" stroke="#ca8a04" stroke-width="2"/>
  <text x="275" y="345" font-size="18" font-weight="bold" fill="#a16207" text-anchor="middle">3. Subdirectory</text>
  <text x="275" y="370" font-size="14" font-family="monospace" fill="#713f12" text-anchor="middle">./subdir/CLAUDE.md</text>
  <text x="275" y="390" font-size="14" fill="#713f12" text-anchor="middle">Loaded when Claude works in that directory.</text>

  <!-- Left axis label -->
  <path d="M 30 70 L 30 380" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4 4" />
  <text x="20" y="225" font-size="13" font-weight="bold" fill="#64748b" transform="rotate(-90 20 225)" text-anchor="middle">Deeper directory wins (primary axis)</text>

  <!-- Right side panel: .local.md -->
  <rect x="560" y="120" width="290" height="290" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="3" stroke-dasharray="8 6"/>
  <text x="705" y="160" font-size="20" font-weight="bold" fill="#0f172a" text-anchor="middle">CLAUDE.local.md</text>
  <text x="705" y="185" font-size="16" font-weight="bold" fill="#475569" text-anchor="middle">(Personal Override)</text>

  <text x="705" y="225" font-size="14" fill="#334155" text-anchor="middle">A .local.md file can exist at</text>
  <text x="705" y="245" font-size="14" fill="#334155" text-anchor="middle">any directory level. It overrides</text>
  <text x="705" y="265" font-size="14" fill="#334155" text-anchor="middle">the shared CLAUDE.md at that</text>
  <text x="705" y="285" font-size="14" fill="#334155" text-anchor="middle">same level — not deeper ones.</text>

  <rect x="600" y="305" width="210" height="1" fill="#cbd5e1"/>

  <text x="705" y="335" font-size="14" fill="#334155" text-anchor="middle">Automatically gitignored.</text>
  <text x="705" y="355" font-size="14" fill="#334155" text-anchor="middle">Your team never sees it.</text>

  <!-- Arrows from panel to levels -->
  <path d="M 555 220 L 515 220" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowleft)"/>
  <path d="M 555 360 L 515 360" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowleft)"/>

  <!-- Bottom: precedence line -->
  <text x="450" y="460" text-anchor="middle" font-size="15" font-weight="bold" fill="#0f172a">Precedence (lowest → highest)</text>
  <text x="450" y="485" text-anchor="middle" font-size="13" fill="#334155">~/.claude/CLAUDE.md → ./CLAUDE.md → ./CLAUDE.local.md → ./subdir/CLAUDE.md → ./subdir/CLAUDE.local.md</text>
  <text x="450" y="508" text-anchor="middle" font-size="13" fill="#64748b">Directory depth is the primary axis. Personal (.local.md) beats shared only at the same level.</text>
</svg>
